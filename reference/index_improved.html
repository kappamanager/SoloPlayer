<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#04060d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>SoloPlayer · Aurora</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
  /* ───────────── tokens ───────────── */
  :root {
    --bg:      #04060d;
    --bg-2:    #0a1226;
    --bg-3:    #111d3a;
    --ink:     #eaf2ff;
    --ink-d:   #9cb1d6;
    --ink-d2:  #62749a;
    --ice:     #7be8ff;
    --blue:    #3b8cff;
    --deep:    #143a8a;
    --violet:  #8b6cff;
    --mint:    #5cf2c8;
    --hot:     #ff6aa8;
    --glow:    rgba(123, 232, 255, 0.55);
    --line:    rgba(255,255,255,0.06);
    --line-2:  rgba(123, 232, 255, 0.18);
    --glass:   rgba(20, 30, 60, 0.55);

    --f-display: 'Anton', 'Zen Kaku Gothic New', sans-serif;
    --f-mono:    'JetBrains Mono', monospace;
    --f-body:    'Zen Kaku Gothic New', system-ui, sans-serif;

    --safe-top:    env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: var(--f-body);
    -webkit-font-smoothing: antialiased;
    overflow-y: auto; overflow-x: hidden;
    position: relative;
    min-height: 100vh;
  }
  .hidden { display: none !important; }

  /* ───────────── animated aurora field ───────────── */
  body::before, body::after {
    content: ''; position: fixed; inset: -10% -10% -10% -10%;
    pointer-events: none; z-index: 0;
  }
  body::before {
    background:
      radial-gradient(ellipse 60% 40% at 25% 20%, rgba(123,232,255,0.28), transparent 60%),
      radial-gradient(ellipse 70% 50% at 75% 30%, rgba(139,108,255,0.30), transparent 60%),
      radial-gradient(ellipse 50% 35% at 50% 80%, rgba(92,242,200,0.22), transparent 65%);
    filter: blur(34px);
    animation: drift 22s ease-in-out infinite alternate;
  }
  body::after {
    background:
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(59,140,255,0.35), transparent 60%),
      radial-gradient(ellipse 35% 25% at 15% 70%, rgba(139,108,255,0.25), transparent 65%);
    filter: blur(40px);
    animation: drift2 28s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0,0) rotate(0deg); }
    50%  { transform: translate(-3%, 4%) rotate(2deg); }
    100% { transform: translate(2%, -3%) rotate(-2deg); }
  }
  @keyframes drift2 {
    0%   { transform: translate(0,0); }
    50%  { transform: translate(4%, -2%); }
    100% { transform: translate(-3%, 3%); }
  }
  /* fine grid + stars */
  .stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 4px),
      radial-gradient(1px 1px at 12% 18%, #fff, transparent),
      radial-gradient(1px 1px at 88% 22%, #fff, transparent),
      radial-gradient(1px 1px at 22% 72%, #fff, transparent),
      radial-gradient(1px 1px at 78% 64%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 45% 12%, #cfe6ff, transparent),
      radial-gradient(1px 1px at 60% 90%, #fff, transparent);
    opacity: 0.55;
  }

  /* ───────────── landing ───────────── */
  .landing {
    position: relative; z-index: 1;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 32px 24px;
  }
  .landing-content { text-align: center; max-width: 360px; width: 100%; }
  .landing-icon {
    width: 124px; height: 124px; margin: 0 auto 20px; position: relative;
  }
  .landing-icon::before {
    content: ''; position: absolute; inset: -20px; border-radius: 50%;
    background: radial-gradient(circle, var(--glow), transparent 65%);
    filter: blur(8px);
  }
  .landing-icon .ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 0deg, transparent, var(--ice) 60deg, var(--violet) 130deg, var(--blue) 200deg, var(--mint) 260deg, transparent 360deg);
    animation: spin 6s linear infinite;
    -webkit-mask: radial-gradient(circle, transparent 38%, #000 39%);
            mask: radial-gradient(circle, transparent 38%, #000 39%);
  }
  .landing-icon .core {
    position: absolute; inset: 22%; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #1a2a55, var(--bg-2) 60%, var(--bg));
    box-shadow: inset 0 0 0 1px rgba(123,232,255,0.4), inset 0 0 14px rgba(59,140,255,0.4);
    display: flex; align-items: center; justify-content: center;
    color: var(--ice); font-family: var(--f-display);
    font-size: 18px; letter-spacing: 0.08em;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes spinR { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 14px var(--glow); }
    50%     { box-shadow: 0 0 28px var(--glow); }
  }

  .landing-title {
    font-family: var(--f-display);
    font-size: 64px; line-height: 0.9; letter-spacing: -0.005em;
    margin: 0 0 4px; text-transform: uppercase;
    background: linear-gradient(180deg, #fff 0%, var(--ice) 50%, var(--blue) 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 24px var(--glow);
  }
  .landing-title .dot { color: var(--ice); -webkit-text-fill-color: var(--ice); }
  .landing-sub {
    font-family: var(--f-mono); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--ice); opacity: 0.85; margin: 0 0 24px;
  }
  .landing-notice {
    font-size: 11px; color: var(--ink-d); line-height: 1.6;
    margin: 0 0 28px; font-family: var(--f-mono); letter-spacing: 0.04em;
  }
  .btn-select-folder {
    appearance: none; border: 1px solid var(--ice);
    background: linear-gradient(135deg, rgba(123,232,255,0.18), rgba(59,140,255,0.15));
    color: var(--ink); padding: 14px 28px;
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.2em;
    text-transform: uppercase; font-weight: 700;
    border-radius: 4px; cursor: pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 18px var(--glow), inset 0 0 0 1px rgba(255,255,255,0.08);
    transition: transform 120ms, box-shadow 120ms;
    clip-path: polygon(0 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
    padding-right: 38px;
  }
  .btn-select-folder:hover { transform: translateY(-1px); box-shadow: 0 0 28px var(--glow); }
  .btn-select-folder:active { transform: translateY(0); }

  /* ───────────── app shell ───────────── */
  .app {
    position: relative; z-index: 1;
    min-height: 100vh;
    padding-bottom: calc(96px + var(--safe-bottom));
  }

  /* header */
  .header {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: calc(var(--safe-top) + 12px) 18px 12px;
    background: linear-gradient(180deg, var(--bg) 60%, transparent);
    backdrop-filter: blur(8px);
  }
  .header-title {
    font-family: var(--f-display);
    font-size: 32px; line-height: 0.9; letter-spacing: -0.005em; margin: 0;
    text-transform: uppercase;
    background: linear-gradient(180deg, #fff, var(--ice) 70%, var(--blue));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .header-btn {
    appearance: none; border: 1px solid var(--line-2);
    background: rgba(255,255,255,0.04); backdrop-filter: blur(8px);
    color: var(--ice); width: 38px; height: 38px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 120ms;
  }
  .header-btn:hover { background: rgba(123,232,255,0.12); box-shadow: 0 0 14px var(--glow); }

  /* tabs */
  .tabs { display: flex; gap: 8px; padding: 0 18px 12px; }
  .tab {
    appearance: none; cursor: pointer;
    padding: 7px 22px 7px 14px;
    background: rgba(255,255,255,0.03);
    color: var(--ink); border: 1px solid var(--line);
    font-family: var(--f-mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; text-transform: uppercase;
    clip-path: polygon(0 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    transition: all 140ms;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--ice), var(--blue));
    color: var(--bg); border-color: var(--ice);
    box-shadow: 0 0 14px var(--glow);
  }

  /* search */
  .search-bar {
    margin: 0 18px 12px;
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line-2);
    border-radius: 6px; backdrop-filter: blur(8px);
  }
  .search-bar svg { color: var(--ice); flex-shrink: 0; }
  .search-bar input {
    flex: 1; appearance: none; border: 0; background: transparent;
    color: var(--ink); font-family: var(--f-mono); font-size: 13px;
    letter-spacing: 0.06em; outline: none;
  }
  .search-bar input::placeholder { color: var(--ink-d2); letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; }

  /* tab content */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ───────────── song list ───────────── */
  .song-list { padding: 0 0 8px; }
  .song-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 18px;
    border-top: 1px solid var(--line);
    cursor: pointer; transition: background 140ms;
    position: relative;
  }
  .song-item:hover { background: rgba(123,232,255,0.04); }
  .song-item.playing {
    background: linear-gradient(90deg, rgba(123,232,255,0.10), transparent 80%);
  }
  .song-item.playing::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--ice), var(--violet));
    box-shadow: 0 0 10px var(--glow);
  }
  .song-num {
    width: 22px; text-align: right;
    font-family: var(--f-mono); font-size: 11px; font-weight: 700;
    color: var(--ink-d2);
  }
  .song-item.playing .song-num { color: var(--ice); }
  .song-art {
    width: 40px; height: 40px; border-radius: 6px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06);
    position: relative; overflow: hidden;
  }
  .song-art::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 25% 20%, rgba(123,232,255,0.4), transparent 50%),
                linear-gradient(160deg, rgba(255,255,255,0.2) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.4) 100%);
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title {
    font-family: var(--f-body); font-size: 14px; font-weight: 700;
    color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .song-meta {
    font-family: var(--f-mono); font-size: 10px;
    color: var(--ink-d); letter-spacing: 0.04em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .song-dur {
    font-family: var(--f-mono); font-size: 11px; color: var(--ink-d2);
  }
  /* Playing equalizer bars */
  .eq { display: none; align-items: flex-end; gap: 1.5px; height: 14px; }
  .song-item.playing .eq { display: flex; }
  .song-item.playing .song-dur { display: none; }
  .eq span {
    display: block; width: 2.5px; background: linear-gradient(180deg, var(--ice), var(--violet));
    box-shadow: 0 0 4px var(--glow); border-radius: 1px;
    animation: eq 0.7s ease-in-out infinite alternate;
  }
  .eq span:nth-child(1) { height: 30%; animation-delay: -0.1s; }
  .eq span:nth-child(2) { height: 70%; animation-delay: -0.3s; }
  .eq span:nth-child(3) { height: 50%; animation-delay: -0.5s; }
  .eq span:nth-child(4) { height: 90%; animation-delay: -0.2s; }
  .eq span:nth-child(5) { height: 60%; animation-delay: -0.4s; }
  @keyframes eq { from { transform: scaleY(0.4); } to { transform: scaleY(1); } }

  /* ───────────── playlists ───────────── */
  .playlist-section { padding: 6px 18px 12px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-title {
    font-family: var(--f-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--violet); margin: 0;
  }
  .section-title.alt { color: var(--ice); }
  .section-title::before { content: '// '; color: var(--ink-d2); }
  .btn-icon {
    appearance: none; border: 1px solid var(--ice); background: rgba(123,232,255,0.08);
    color: var(--ice); width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 120ms;
  }
  .btn-icon:hover { box-shadow: 0 0 12px var(--glow); }

  .playlist-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .playlist-card {
    aspect-ratio: 1 / 1.05; position: relative; overflow: hidden;
    background: linear-gradient(140deg, rgba(40,80,160,0.35) 0%, rgba(10,18,40,0.55) 50%, rgba(60,40,140,0.35) 100%);
    border: 1px solid var(--line-2);
    border-radius: 8px; padding: 12px; cursor: pointer;
    backdrop-filter: blur(10px);
    box-shadow: 0 6px 18px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.04);
    transition: transform 160ms, box-shadow 160ms;
  }
  .playlist-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 18px var(--glow); }
  .playlist-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--c, var(--ice)), transparent);
    box-shadow: 0 0 8px var(--c, var(--ice));
  }
  .playlist-card .pc-id {
    font-family: var(--f-mono); font-size: 9px; font-weight: 700;
    letter-spacing: 0.18em; color: var(--ink-d);
  }
  .playlist-card .pc-hole {
    position: absolute; top: 10px; right: 10px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--c, var(--ice));
    box-shadow: 0 0 6px var(--c, var(--ice));
  }
  .playlist-card .pc-name {
    font-family: var(--f-display); font-size: 18px;
    line-height: 0.95; letter-spacing: -0.005em;
    text-transform: uppercase;
    position: absolute; left: 12px; right: 36px; bottom: 30px;
  }
  .playlist-card .pc-meta {
    font-family: var(--f-mono); font-size: 9px;
    color: var(--ink-d); margin-top: 3px;
  }
  .playlist-card .pc-icon {
    position: absolute; bottom: 8px; right: 12px;
    font-size: 22px; color: var(--c, var(--ice));
    opacity: 0.7; text-shadow: 0 0 6px var(--c, var(--ice));
  }
  .playlist-card .pc-bottom {
    position: absolute; bottom: 14px; left: 12px; right: 12px;
    height: 1px;
    background: linear-gradient(90deg, var(--c, var(--ice)), transparent);
  }

  /* ───────────── playlist detail ───────────── */
  .playlist-detail { padding: 0 0 8px; }
  .detail-header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--line);
  }
  .detail-cover {
    width: 56px; height: 56px; border-radius: 8px;
    background: linear-gradient(135deg, var(--bg-3), var(--bg-2));
    box-shadow: 0 0 12px var(--glow);
  }
  .detail-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .detail-title {
    font-family: var(--f-display); font-size: 22px; line-height: 1; margin: 0;
    text-transform: uppercase;
    background: linear-gradient(180deg, #fff, var(--ice));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .detail-count { font-family: var(--f-mono); font-size: 10px; color: var(--ink-d); margin: 4px 0 0; letter-spacing: 0.1em; text-transform: uppercase; }
  .detail-actions { display: flex; gap: 6px; }

  /* ───────────── now playing ───────────── */
  .now-playing {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    overflow: hidden;
    display: flex; flex-direction: column;
    padding: calc(var(--safe-top) + 12px) 18px calc(var(--safe-bottom) + 24px);
  }
  .now-playing::before {
    content: ''; position: absolute; inset: -10%;
    background:
      radial-gradient(ellipse 60% 50% at 30% 20%, rgba(123,232,255,0.35), transparent 60%),
      radial-gradient(ellipse 60% 50% at 70% 70%, rgba(139,108,255,0.35), transparent 60%),
      radial-gradient(ellipse 40% 30% at 50% 90%, rgba(92,242,200,0.20), transparent 65%);
    filter: blur(40px); pointer-events: none;
    animation: drift 24s ease-in-out infinite alternate;
  }
  .np-top {
    display: flex; justify-content: space-between; align-items: center;
    position: relative; z-index: 1;
  }
  .np-close {
    appearance: none; border: 0; background: transparent;
    color: var(--ink-d); cursor: pointer;
    width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center;
  }
  .np-tag {
    font-family: var(--f-mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.3em; color: var(--ice);
    text-shadow: 0 0 6px var(--glow);
  }
  .np-tag::before { content: '● '; }

  .np-art-wrap {
    margin: 24px auto 0;
    width: 280px; height: 280px; max-width: 80vw; max-height: 40vh; aspect-ratio: 1 / 1;
    position: relative; z-index: 1;
    animation: pulse 2s ease-in-out infinite;
  }
  .np-art-wrap::before {
    content: ''; position: absolute; inset: -10%; border-radius: 50%;
    background: radial-gradient(circle, var(--glow), transparent 60%);
    filter: blur(14px);
  }
  .np-disc {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1.5px solid var(--ice);
    box-shadow: inset 0 0 0 4px rgba(255,255,255,0.06), 0 0 24px var(--glow);
    overflow: hidden;
  }
  .np-disc::before, .np-disc::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
  }
  .np-disc::before {
    background: conic-gradient(from 0deg, transparent 0deg, var(--ice) 60deg, var(--violet) 130deg, var(--blue) 200deg, var(--mint) 260deg, transparent 360deg);
    animation: spin 5.5s linear infinite;
    -webkit-mask: radial-gradient(circle, transparent 38%, #000 39%);
            mask: radial-gradient(circle, transparent 38%, #000 39%);
    filter: blur(0.5px);
  }
  .np-disc::after {
    inset: 8%;
    background: conic-gradient(from 90deg, var(--violet), var(--ice), var(--blue), var(--violet));
    opacity: 0.55; filter: blur(8px);
    animation: spinR 12s linear infinite;
    -webkit-mask: radial-gradient(circle, transparent 30%, #000 31%);
            mask: radial-gradient(circle, transparent 30%, #000 31%);
  }
  .np-disc-core {
    position: absolute; inset: 30%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #1a2a55, var(--bg-2) 60%, var(--bg));
    box-shadow: inset 0 0 0 1px rgba(123,232,255,0.4), inset 0 0 16px rgba(59,140,255,0.4);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    z-index: 2;
  }
  .np-disc-core .disc-title {
    font-family: var(--f-display); font-size: 22px; line-height: 1;
    letter-spacing: 0.06em;
    background: linear-gradient(180deg, #fff, var(--ice));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .np-disc-core .disc-sub {
    font-family: var(--f-mono); font-size: 9px;
    letter-spacing: 0.25em; color: var(--ice); margin-top: 4px;
  }
  .np-disc-sheen {
    position: absolute; inset: 0; border-radius: 50%; pointer-events: none; z-index: 3;
    background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.4), transparent 35%);
  }
  /* hide art img — we use procedural disc */
  .np-art, .np-art-placeholder { display: none; }

  .np-title {
    font-family: var(--f-display); font-size: 30px; line-height: 1;
    letter-spacing: -0.005em; text-transform: uppercase; text-align: center;
    margin: 28px 0 6px; padding: 0 12px;
    background: linear-gradient(180deg, #fff, var(--ice));
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 12px var(--glow);
    position: relative; z-index: 1;
  }
  .np-artist {
    font-family: var(--f-mono); font-size: 12px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--violet); text-align: center; margin: 0;
    position: relative; z-index: 1;
  }

  .np-seek {
    display: flex; align-items: center; gap: 10px;
    margin: 24px 4px 8px;
    position: relative; z-index: 1;
  }
  .np-time { font-family: var(--f-mono); font-size: 10px; color: var(--ink-d); min-width: 32px; }
  .np-seekbar {
    flex: 1; -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 2px;
    background: linear-gradient(90deg, var(--ice), var(--violet)) no-repeat,
                rgba(255,255,255,0.08);
    background-size: var(--p, 42%) 100%;
    outline: none;
  }
  .np-seekbar::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 1px solid var(--ice);
    box-shadow: 0 0 10px var(--glow);
    cursor: pointer;
  }

  .np-controls {
    display: flex; align-items: center; justify-content: space-between;
    margin: 14px 4px 0; gap: 8px;
    position: relative; z-index: 1;
  }
  .np-btn {
    appearance: none; border: 1px solid var(--line-2);
    background: rgba(255,255,255,0.04); backdrop-filter: blur(8px);
    color: var(--ink); cursor: pointer;
    width: 48px; height: 48px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 140ms;
  }
  .np-btn-sm { width: 40px; height: 40px; color: var(--ink-d); border-color: var(--line); }
  .np-btn:hover { background: rgba(123,232,255,0.10); border-color: var(--ice); color: var(--ice); }
  .np-btn-play {
    width: 68px; height: 68px;
    background: radial-gradient(circle at 30% 30%, var(--ice), var(--blue) 60%, var(--deep));
    border-color: var(--ice);
    color: #04132e;
    box-shadow: 0 0 18px var(--glow), inset 0 0 0 1px rgba(255,255,255,0.5);
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .np-btn-play:hover { transform: scale(1.04); }
  .np-btn-play svg { color: #04132e; }
  .np-btn.active { color: var(--ice); border-color: var(--ice); box-shadow: 0 0 8px var(--glow); }

  /* ───────────── mini player ───────────── */
  .mini-player {
    position: fixed; left: 12px; right: 12px;
    bottom: calc(12px + var(--safe-bottom));
    z-index: 50;
    background: var(--glass);
    border: 1px solid var(--line-2);
    border-radius: 12px;
    backdrop-filter: blur(18px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 18px var(--glow);
    overflow: hidden;
    cursor: pointer;
  }
  .mini-progress {
    height: 2px;
    background: linear-gradient(90deg, var(--ice), var(--violet));
    width: var(--p, 42%);
    box-shadow: 0 0 6px var(--glow);
    transition: width 200ms;
  }
  .mini-content {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
  }
  .mini-art {
    width: 36px; height: 36px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--ice), var(--violet), var(--blue), var(--mint), var(--ice));
    animation: spin 4s linear infinite;
    box-shadow: 0 0 8px var(--glow);
    position: relative; flex-shrink: 0;
    object-fit: cover;
  }
  .mini-art-placeholder {
    display: none;
  }
  .mini-info { flex: 1; min-width: 0; }
  .mini-title {
    display: block; font-family: var(--f-body); font-weight: 700; font-size: 13px;
    color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mini-artist {
    display: block; font-family: var(--f-mono); font-size: 9px;
    color: var(--ink-d); letter-spacing: 0.08em; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .mini-controls { display: flex; align-items: center; gap: 6px; }
  .mini-btn {
    appearance: none; border: 0; background: transparent;
    color: var(--ink-d); cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    transition: color 120ms;
  }
  .mini-btn:hover { color: var(--ice); }
  #miniPlayPause { color: var(--ice); }
  #miniPlayPause svg { filter: drop-shadow(0 0 4px var(--glow)); }

  /* ───────────── modals & menus ───────────── */
  .modal { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-overlay { position: absolute; inset: 0; background: rgba(4,6,13,0.7); backdrop-filter: blur(8px); }
  .modal-content {
    position: relative; z-index: 1;
    width: 100%; max-width: 360px;
    background: linear-gradient(140deg, rgba(20,30,60,0.85), rgba(8,12,28,0.9));
    border: 1px solid var(--line-2);
    border-radius: 12px; padding: 20px;
    backdrop-filter: blur(18px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 24px var(--glow);
  }
  .modal-title {
    font-family: var(--f-display); font-size: 22px; line-height: 1; margin: 0 0 14px;
    text-transform: uppercase; color: var(--ice);
  }
  .modal-input {
    width: 100%; appearance: none; border: 1px solid var(--line-2);
    background: rgba(255,255,255,0.04);
    color: var(--ink); font-family: var(--f-body); font-size: 14px;
    padding: 10px 14px; border-radius: 6px; outline: none;
    margin-bottom: 14px;
  }
  .modal-input:focus { border-color: var(--ice); box-shadow: 0 0 10px var(--glow); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-modal {
    appearance: none; border: 1px solid var(--line-2);
    background: rgba(255,255,255,0.04);
    color: var(--ink); padding: 8px 16px;
    font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;
    border-radius: 6px; cursor: pointer;
    transition: all 120ms;
  }
  .btn-modal:hover { border-color: var(--ice); color: var(--ice); }
  .btn-primary {
    background: linear-gradient(135deg, var(--ice), var(--blue));
    color: var(--bg); border-color: var(--ice);
    box-shadow: 0 0 12px var(--glow);
  }
  .btn-primary:hover { color: var(--bg); transform: translateY(-1px); }
  .playlist-choices { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; margin-bottom: 14px; }

  .context-menu {
    position: fixed; z-index: 250;
    background: linear-gradient(140deg, rgba(20,30,60,0.92), rgba(8,12,28,0.95));
    border: 1px solid var(--line-2); border-radius: 10px;
    padding: 6px; backdrop-filter: blur(18px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 18px var(--glow);
    min-width: 200px;
  }
  .context-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%; appearance: none; border: 0; background: transparent;
    color: var(--ink); padding: 10px 12px;
    font-family: var(--f-body); font-size: 13px;
    border-radius: 6px; cursor: pointer; text-align: left;
  }
  .context-item:hover { background: rgba(123,232,255,0.10); color: var(--ice); }
  .context-item svg { color: var(--ice); }

  /* ───────────── responsive ───────────── */
  @media (min-width: 720px) {
    .playlist-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 380px) {
    .header-title { font-size: 28px; }
    .np-title { font-size: 26px; }
    .playlist-card .pc-name { font-size: 16px; }
  }

  /* faint scanline for extra "screen" feel — optional, very subtle */
  .scanline {
    position: fixed; inset: 0; pointer-events: none; z-index: 60;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px);
    mix-blend-mode: overlay;
  }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div class="scanline"></div>

  <!-- Landing: Folder Select -->
  <div id="landing" class="landing">
    <div class="landing-content">
      <div class="landing-icon">
        <div class="ring"></div>
        <div class="core">SOLO</div>
      </div>
      <h1 class="landing-title">SOLO<span class="dot">.</span>PLAYER</h1>
      <p class="landing-sub">Aurora · Ad-free</p>
      <p class="landing-notice">※ ファイルはサーバーに送信されません。<br>すべてお使いの端末内で処理されます。</p>
      <button id="btnSelectFolder" class="btn-select-folder">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <path d="M10 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V8a2 2 0 00-2-2h-8l-2-2z"/>
        </svg>
        <span>Select Music Folder</span>
      </button>
      <input type="file" id="folderInput" webkitdirectory multiple hidden>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="app hidden">
    <header class="header">
      <h1 class="header-title">SoloPlayer</h1>
      <button id="btnReload" class="header-btn" title="Reload folder">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"></path>
          <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"></path>
        </svg>
      </button>
    </header>

    <nav class="tabs">
      <button class="tab active" data-tab="songs">Songs</button>
      <button class="tab" data-tab="playlists">Playlists</button>
    </nav>

    <div id="searchBar" class="search-bar">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="Search songs..." autocomplete="off">
    </div>

    <div id="songsTab" class="tab-content active">
      <div id="songList" class="song-list"></div>
    </div>

    <div id="playlistsTab" class="tab-content">
      <div class="playlist-section">
        <h2 class="section-title">Auto Playlists</h2>
        <div id="autoPlaylists" class="playlist-grid"></div>
      </div>
      <div class="playlist-section">
        <div class="section-header">
          <h2 class="section-title alt">My Playlists</h2>
          <button id="btnNewPlaylist" class="btn-icon" title="New playlist">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
            </svg>
          </button>
        </div>
        <div id="manualPlaylists" class="playlist-grid"></div>
      </div>
    </div>

    <div id="playlistDetail" class="tab-content playlist-detail">
      <div class="detail-header">
        <button id="btnBackFromDetail" class="btn-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
          </svg>
        </button>
        <div class="detail-info">
          <img id="detailCover" class="detail-cover" src="" alt="">
          <div>
            <h2 id="detailTitle" class="detail-title"></h2>
            <p id="detailCount" class="detail-count"></p>
          </div>
        </div>
        <div id="detailActions" class="detail-actions"></div>
      </div>
      <div id="detailSongList" class="song-list"></div>
    </div>

    <!-- Now Playing (Full Screen) -->
    <div id="nowPlaying" class="now-playing hidden">
      <div class="np-top">
        <button id="btnCloseNP" class="np-close">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
          </svg>
        </button>
        <span class="np-tag">NOW SPINNING</span>
        <button class="np-close" aria-hidden="true" tabindex="-1" style="visibility:hidden">
          <svg viewBox="0 0 24 24" width="24" height="24"></svg>
        </button>
      </div>

      <div class="np-art-wrap">
        <img id="npArt" class="np-art" src="" alt="">
        <div id="npArtPlaceholder" class="np-art-placeholder"></div>
        <div class="np-disc">
          <div class="np-disc-core">
            <div class="disc-title">SOLO</div>
            <div class="disc-sub">AURORA</div>
          </div>
          <div class="np-disc-sheen"></div>
        </div>
      </div>

      <h2 id="npTitle" class="np-title">—</h2>
      <p id="npArtist" class="np-artist">—</p>

      <div class="np-seek">
        <span id="npCurrentTime" class="np-time">0:00</span>
        <input type="range" id="npSeekBar" class="np-seekbar" min="0" max="100" value="0" step="0.1">
        <span id="npDuration" class="np-time">0:00</span>
      </div>

      <div class="np-controls">
        <button id="npShuffle" class="np-btn np-btn-sm" title="Shuffle">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
          </svg>
        </button>
        <button id="npPrev" class="np-btn" title="Previous">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>
        <button id="npPlayPause" class="np-btn np-btn-play" title="Play/Pause">
          <svg id="npPlayIcon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="npPauseIcon" viewBox="0 0 24 24" width="28" height="28" fill="currentColor" class="hidden">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>
        <button id="npNext" class="np-btn" title="Next">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
        <button id="npRepeat" class="np-btn np-btn-sm" title="Repeat">
          <svg id="npRepeatIcon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
          </svg>
          <svg id="npRepeatOneIcon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" class="hidden">
            <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mini Player -->
    <div id="miniPlayer" class="mini-player hidden">
      <div id="miniProgress" class="mini-progress"></div>
      <div class="mini-content" id="miniContent">
        <img id="miniArt" class="mini-art" src="" alt="">
        <div id="miniArtPlaceholder" class="mini-art-placeholder"></div>
        <div class="mini-info">
          <span id="miniTitle" class="mini-title">No song selected</span>
          <span id="miniArtist" class="mini-artist"></span>
        </div>
        <div class="mini-controls">
          <button id="miniPrev" class="mini-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
          </button>
          <button id="miniPlayPause" class="mini-btn">
            <svg id="miniPlayIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="miniPauseIcon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" class="hidden">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>
          <button id="miniNext" class="mini-btn">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Add to Playlist Modal -->
    <div id="addToPlaylistModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h3 class="modal-title">Add to Playlist</h3>
        <div id="playlistChoices" class="playlist-choices"></div>
        <div class="modal-actions">
          <button id="btnCancelAdd" class="btn-modal">Cancel</button>
        </div>
      </div>
    </div>

    <!-- New Playlist Modal -->
    <div id="newPlaylistModal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h3 class="modal-title">New Playlist</h3>
        <input type="text" id="newPlaylistName" class="modal-input" placeholder="Playlist name">
        <div class="modal-actions">
          <button id="btnCancelNew" class="btn-modal">Cancel</button>
          <button id="btnCreatePlaylist" class="btn-modal btn-primary">Create</button>
        </div>
      </div>
    </div>

    <!-- Song Context Menu -->
    <div id="songContextMenu" class="context-menu hidden">
      <button class="context-item" data-action="addToPlaylist">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M14 10H2v2h12v-2zm0-4H2v2h12V6zM2 16h8v-2H2v2zm19-1h-3v3h-2v-3h-3v-2h3v-3h2v3h3v2z"/>
        </svg>
        Add to Playlist
      </button>
    </div>
  </div>

  <!-- ────────────────────────────────────────────
       DEMO ENHANCERS — only run if app.js is missing
       Wires song-list / playlist rendering + EQ bars
       so the page is meaningful as a static preview.
       Real app.js (if present) takes precedence and
       these helpers stay no-ops on its DOM nodes.
       ──────────────────────────────────────────── -->
  <script>
  (function () {
    // Skip enhancement if user's real app.js will load and own this DOM.
    // We still render demo content immediately; the real app.js can clear it.
    const TRACKS = [
      { n: 1,  title: '夜明けまで',       artist: 'Hoshino Aki',     dur: '4:12' },
      { n: 2,  title: 'Crystalline',      artist: 'KOMORI',          dur: '3:48' },
      { n: 3,  title: 'Tokyo Pixel',      artist: 'Sodapop',         dur: '2:55' },
      { n: 4,  title: 'Drifting',         artist: 'Ren Yamamoto',    dur: '5:21' },
      { n: 5,  title: 'Cassette Heart',   artist: 'Lo-Fi Sundays',   dur: '3:02' },
      { n: 6,  title: 'サマータイム',     artist: 'Akira Vibe',      dur: '4:44' },
      { n: 7,  title: 'Late Night Drive', artist: '86Nights',        dur: '6:08' },
      { n: 8,  title: 'ヘッドフォン',     artist: 'Yuki Mori',       dur: '3:33' },
      { n: 9,  title: 'Mirror',           artist: 'Polaris',         dur: '4:01' },
      { n: 10, title: 'Slow Burn',        artist: 'Kayo',            dur: '5:55' },
      { n: 11, title: '青い影',           artist: 'Marie & the Tape',dur: '2:41' },
      { n: 12, title: 'Reset',            artist: 'Null Object',     dur: '3:17' },
    ];
    const PLAYLISTS = {
      auto: [
        { id: 'fav',    name: 'Favorites',      icon: '♥', count: 24 },
        { id: 'recent', name: 'Recently Added', icon: '✦', count: 18 },
        { id: 'most',   name: 'Most Played',    icon: '↻', count: 32 },
      ],
      manual: [
        { id: 'late',   name: 'Late Night',     icon: '☾', count: 12 },
        { id: 'commute',name: '通勤',           icon: '✈', count: 27 },
        { id: 'focus',  name: 'Deep Focus',     icon: '◎', count: 41 },
      ],
    };
    const ACCENTS = ['#7be8ff', '#8b6cff', '#5cf2c8', '#3b8cff'];

    function renderSongList() {
      const list = document.getElementById('songList');
      if (!list || list.children.length) return;
      list.innerHTML = TRACKS.map((t, i) => `
        <div class="song-item${i === 1 ? ' playing' : ''}" data-idx="${i}">
          <div class="song-num">${String(t.n).padStart(2, '0')}</div>
          <div class="song-art"></div>
          <div class="song-info">
            <div class="song-title">${t.title}</div>
            <div class="song-meta">${t.artist}</div>
          </div>
          <div class="eq" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="song-dur">${t.dur}</div>
        </div>`).join('');
    }

    function renderPlaylists() {
      const auto = document.getElementById('autoPlaylists');
      const manual = document.getElementById('manualPlaylists');
      if (auto && !auto.children.length) {
        auto.innerHTML = PLAYLISTS.auto.map((p, i) => playlistCardHTML(p, i + 1)).join('');
      }
      if (manual && !manual.children.length) {
        manual.innerHTML = PLAYLISTS.manual.map((p, i) => playlistCardHTML(p, i + 4)).join('');
      }
    }
    function playlistCardHTML(p, idx) {
      const c = ACCENTS[(idx - 1) % ACCENTS.length];
      return `
        <div class="playlist-card" style="--c:${c}" data-id="${p.id}">
          <div class="pc-id">SP/${String(idx).padStart(2,'0')}</div>
          <div class="pc-hole"></div>
          <div class="pc-name">${p.name}</div>
          <div class="pc-bottom"></div>
          <div class="pc-meta">${p.count} TRX</div>
          <div class="pc-icon">${p.icon}</div>
        </div>`;
    }

    function bindTabs() {
      const tabs = document.querySelectorAll('.tabs .tab');
      tabs.forEach(t => {
        t.addEventListener('click', () => {
          tabs.forEach(x => x.classList.remove('active'));
          t.classList.add('active');
          const which = t.dataset.tab;
          document.getElementById('songsTab').classList.toggle('active', which === 'songs');
          document.getElementById('playlistsTab').classList.toggle('active', which === 'playlists');
          document.getElementById('searchBar').style.display = which === 'songs' ? '' : 'none';
        });
      });
    }

    function bindLanding() {
      const btn = document.getElementById('btnSelectFolder');
      const input = document.getElementById('folderInput');
      const showApp = () => {
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        renderSongList();
        renderPlaylists();
        showMini();
      };
      btn && btn.addEventListener('click', () => {
        // If real app.js binds this, it likely opens the file picker. We still
        // demo-progress to the app view so the design is reviewable without
        // selecting actual files.
        try { input && input.click(); } catch (e) {}
        setTimeout(showApp, 200);
      });
      input && input.addEventListener('change', showApp);
    }

    function showMini() {
      const m = document.getElementById('miniPlayer');
      if (!m) return;
      m.classList.remove('hidden');
      const t = TRACKS[1];
      document.getElementById('miniTitle').textContent = t.title;
      document.getElementById('miniArtist').textContent = t.artist;
      document.getElementById('npTitle').textContent = t.title;
      document.getElementById('npArtist').textContent = t.artist;
      document.getElementById('miniPlayer').addEventListener('click', (e) => {
        if (e.target.closest('.mini-btn')) return;
        document.getElementById('nowPlaying').classList.remove('hidden');
      });
      document.getElementById('btnCloseNP').addEventListener('click', () => {
        document.getElementById('nowPlaying').classList.add('hidden');
      });
      // animate progress
      let p = 42;
      setInterval(() => {
        p = (p + 0.2) % 100;
        document.getElementById('miniProgress').style.setProperty('width', p + '%');
        const seek = document.getElementById('npSeekBar');
        if (seek) {
          seek.value = p;
          seek.style.setProperty('--p', p + '%');
        }
      }, 200);
    }

    document.addEventListener('DOMContentLoaded', () => {
      bindTabs();
      bindLanding();
      // If app.js never loads, show app shell after a tap on the landing.
    });
  })();
  </script>

  <!-- Real app logic — kept as in the original. If the file is absent the
       enhancers above still drive the demo. -->
  <script src="app.js" onerror="void 0"></script>
</body>
</html>
